    <script>
      // Prevent libraries from crashing when trying to overwrite fetch
      try {
        const originalFetch = window.fetch;
        if (originalFetch) {
          Object.defineProperty(window, 'fetch', {
            get: function() { return originalFetch; },
            set: function() { /* ignore */ },
            configurable: true
          });
        }
      } catch (e) {}
    </script>
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
